receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Metrics → existing Prometheus on neptun via remote_write (push model)
  prometheusremotewrite:
    endpoint: "http://neptun.tale-manta.ts.net:9090/api/v1/write"
    tls:
      insecure: true

  # Logs → local Loki container via OTLP (native Loki 3.x endpoint)
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true

  # Traces → local Tempo container (OTLP gRPC, internal network only)
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Useful during development: prints telemetry to collector logs
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
